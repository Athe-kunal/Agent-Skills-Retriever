input:
  mined_parquet_path: artifacts/retriever_training/train.parquet
  validation_parquet_path: artifacts/retriever_training/validation.parquet

model:
  name: Qwen/Qwen3-Embedding-0.6B

training:
  epochs: 3
  batch_size: 32
  learning_rate: 2.0e-5
  warmup_steps: 200
  evaluation_steps: 200
  checkpoint_save_steps: 1000
  seed: 13

output:
  dir: artifacts/sentence_transformers/qwen3-mined-negatives

logging:
  use_wandb: false
  project: ast-skills-retriever
  entity: ""
  run_name: qwen3-mined-negatives-train
